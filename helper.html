<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiutami a scegliere – Gallo d'Oro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C8A84B;--gold-light:#E2C97E;--dark:#0E0D0B;--dark-2:#1A1814;--dark-3:#252319;--cream:#F5EDD8;--cream-muted:#B8A98A}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(14,13,11,0.97);border-bottom:1px solid rgba(200,168,75,0.15)}
.nav-logo img{height:40px}
.nav-logo-text{color:var(--gold);text-decoration:none;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;border:1px solid rgba(200,168,75,0.4);padding:8px 16px;transition:all 0.2s;font-family:'Montserrat',sans-serif}
.nav-logo-text:hover{background:var(--gold);color:var(--dark)}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:var(--cream-muted);text-decoration:none;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;transition:color 0.3s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-links li:first-child a{color:var(--gold);border:1px solid rgba(200,168,75,0.4);padding:8px 16px;letter-spacing:0.15em;transition:all 0.2s}
.nav-links li:first-child a:hover{background:var(--gold);color:var(--dark)}

/* CONTAINER */
.main{padding:100px 60px 120px;max-width:860px;margin:0 auto}

/* HEADER */
.page-header{text-align:center;margin-bottom:52px}
.page-eyebrow{font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5vw,56px);font-weight:300;font-style:italic;color:var(--cream);line-height:1.1;margin-bottom:12px}
.page-sub{font-size:12px;color:var(--cream-muted);line-height:1.9;max-width:480px;margin:0 auto}

/* PROGRESS */
.progress-wrap{margin-bottom:40px}
.progress-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cream-muted);margin-bottom:10px;text-align:center}
.progress-bar{width:100%;height:2px;background:rgba(200,168,75,0.1);border-radius:1px}
.progress-fill{height:100%;background:var(--gold);border-radius:1px;transition:width 0.5s ease}

/* QUESTION */
.question-card{background:var(--dark-2);border:1px solid rgba(200,168,75,0.12);padding:36px;margin-bottom:24px;animation:fadeUp 0.35s ease}
.q-step{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.q-text{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,3vw,30px);font-weight:300;color:var(--cream);margin-bottom:6px;line-height:1.3}
.q-hint{font-size:11px;color:var(--cream-muted);font-style:italic;margin-bottom:24px}
.options{display:flex;flex-wrap:wrap;gap:10px}
.opt{background:transparent;border:1px solid rgba(200,168,75,0.2);color:var(--cream-muted);padding:11px 20px;font-size:11px;letter-spacing:0.08em;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;-webkit-appearance:none;touch-action:manipulation;border-radius:0}
.opt:hover{border-color:var(--gold);color:var(--cream)}
.opt.sel{background:rgba(200,168,75,0.1);border-color:var(--gold);color:var(--gold)}
.opt.sel::before{content:'✓ '}

/* NAV BUTTONS */
.bot-nav{display:flex;justify-content:space-between;gap:16px;margin-top:24px}
.btn-back{background:transparent;border:1px solid rgba(200,168,75,0.2);color:var(--cream-muted);padding:13px 28px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;-webkit-appearance:none;touch-action:manipulation}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.btn-next{background:var(--gold);color:var(--dark);padding:13px 36px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:500;border:2px solid var(--gold);transition:all 0.2s;-webkit-appearance:none;touch-action:manipulation}
.btn-next:hover{background:transparent;color:var(--gold)}
.btn-next:disabled{opacity:0.3;cursor:not-allowed}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--cream-muted);font-size:13px;font-style:italic}
.spinner{width:32px;height:32px;border:2px solid rgba(200,168,75,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}

/* DISHES SECTION */
.dishes-wrap{animation:fadeUp 0.4s ease}
.dishes-header{text-align:center;margin-bottom:40px}
.dishes-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,44px);font-weight:300;font-style:italic;color:var(--cream);margin-bottom:8px}
.dishes-sub{font-size:11px;color:var(--cream-muted);letter-spacing:0.08em}

.category-block{margin-bottom:40px}
.cat-label{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.cat-label::after{content:'';flex:1;height:1px;background:rgba(200,168,75,0.15)}

.dish-card{background:var(--dark-2);border:1px solid rgba(200,168,75,0.08);padding:20px 24px;margin-bottom:8px;display:flex;align-items:flex-start;gap:16px;cursor:pointer;transition:border-color 0.2s,background 0.2s;touch-action:manipulation}
.dish-card:hover{border-color:rgba(200,168,75,0.25)}
.dish-card.chosen{border-color:var(--gold);background:rgba(200,168,75,0.06)}
.dish-check{width:22px;height:22px;border:1px solid rgba(200,168,75,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);margin-top:2px;transition:all 0.2s}
.dish-card.chosen .dish-check{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.dish-info{flex:1}
.dish-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--cream);margin-bottom:3px}
.dish-desc{font-size:11px;color:var(--cream-muted);line-height:1.6;margin-bottom:4px}
.dish-warn{font-size:10px;color:var(--gold-light);background:rgba(226,201,126,0.07);padding:5px 10px;border-left:2px solid var(--gold-light);margin-top:6px}
.dish-price{font-size:15px;color:var(--gold);white-space:nowrap;padding-top:2px}
.dish-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.dish-tag{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border:1px solid rgba(200,168,75,0.2);color:var(--cream-muted)}

.no-results{text-align:center;padding:40px;color:var(--cream-muted);font-size:13px;font-style:italic;background:var(--dark-2);border:1px solid rgba(200,168,75,0.08)}

/* FLOATING ORDER BUTTON */
.float-order{position:fixed;bottom:32px;right:32px;z-index:50;background:var(--gold);color:var(--dark);padding:14px 28px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:500;border:none;box-shadow:0 4px 24px rgba(200,168,75,0.3);transition:all 0.2s;display:none;-webkit-appearance:none;touch-action:manipulation}
.float-order.show{display:block}
.float-order:hover{background:var(--gold-light)}

/* WINE OFFER & FLOW */
.wine-offer{background:var(--dark-3);border:1px solid rgba(200,168,75,0.2);padding:32px;text-align:center;margin-top:32px;animation:fadeUp 0.4s ease}
.wine-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:var(--cream);margin-bottom:8px}
.wine-sub{font-size:12px;color:var(--cream-muted);line-height:1.8;margin-bottom:24px}
.wine-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-wine-yes{background:var(--gold);color:var(--dark);padding:13px 32px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:500;border:2px solid var(--gold);transition:all 0.2s;-webkit-appearance:none;touch-action:manipulation}
.btn-wine-yes:hover{background:transparent;color:var(--gold)}
.btn-wine-no{background:transparent;border:1px solid rgba(200,168,75,0.2);color:var(--cream-muted);padding:13px 32px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;-webkit-appearance:none;touch-action:manipulation}
.btn-wine-no:hover{border-color:var(--gold);color:var(--gold)}
.wine-step{background:var(--dark-3);border:1px solid rgba(200,168,75,0.15);padding:28px;margin-top:16px;animation:fadeUp 0.3s ease}
.wine-step-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--cream);margin-bottom:6px}
.wine-step-hint{font-size:11px;color:var(--cream-muted);margin-bottom:20px}
.wine-opts{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.wine-opt{background:transparent;border:1px solid rgba(200,168,75,0.2);color:var(--cream-muted);padding:11px 20px;font-size:11px;letter-spacing:0.08em;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;-webkit-appearance:none;touch-action:manipulation}
.wine-opt:hover,.wine-opt.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,0.07)}
.price-slider-wrap{margin:20px 0 8px;text-align:center}
.price-range-label{font-size:14px;color:var(--gold);font-family:'Cormorant Garamond',serif;margin-bottom:14px;display:block;font-style:italic}
.price-track{position:relative;height:2px;background:rgba(200,168,75,0.15);margin:28px 8px 8px;border-radius:1px}
.price-track-fill{position:absolute;height:100%;background:var(--gold);border-radius:1px;top:0}
input[type=range].price-slider{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:transparent;outline:none;position:absolute;top:0;left:0;margin:0;pointer-events:none}
input[type=range].price-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--dark);pointer-events:all;box-shadow:0 0 8px rgba(200,168,75,0.4)}
input[type=range].price-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--dark);pointer-events:all}
.price-minmax{display:flex;justify-content:space-between;font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;margin-top:4px}
.wine-cards{display:flex;flex-direction:column;gap:12px;margin-top:20px;animation:fadeUp 0.35s ease}
.wine-card{background:var(--dark-2);border:1px solid rgba(200,168,75,0.1);padding:20px 24px;display:flex;gap:16px;align-items:flex-start;cursor:pointer;transition:all 0.2s;touch-action:manipulation}
.wine-card:hover{border-color:rgba(200,168,75,0.3)}
.wine-card.chosen{border-color:var(--gold);background:rgba(200,168,75,0.06)}
.wine-card-check{width:22px;height:22px;border:1px solid rgba(200,168,75,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);margin-top:2px;transition:all 0.2s}
.wine-card.chosen .wine-card-check{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.wine-card-info{flex:1}
.wine-card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--cream);margin-bottom:2px}
.wine-card-meta{font-size:10px;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.wine-card-desc{font-size:11px;color:var(--cream-muted);line-height:1.7}
.wine-card-price{font-size:16px;color:var(--gold);white-space:nowrap;font-family:'Cormorant Garamond',serif;padding-top:2px}
.wine-badge{display:inline-block;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border:1px solid rgba(200,168,75,0.25);color:var(--cream-muted);margin-right:6px;margin-top:4px}
.wine-spinner-wrap{text-align:center;padding:32px;color:var(--cream-muted);font-size:12px;font-style:italic}
.wine-spinner-wrap .spinner{width:24px;height:24px;border:2px solid rgba(200,168,75,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}

/* WAITER SCREEN */
.waiter-overlay{display:none;position:fixed;inset:0;background:var(--dark);z-index:200;overflow-y:auto;padding:60px 40px;flex-direction:column}
.waiter-overlay.show{display:flex;flex-direction:column}
.waiter-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5vw,52px);font-weight:300;font-style:italic;color:var(--gold);text-align:center;margin-bottom:6px}
.waiter-sub{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--cream-muted);text-align:center;margin-bottom:48px}
.waiter-items{flex:1}
.waiter-item{display:flex;justify-content:space-between;align-items:baseline;padding:18px 0;border-bottom:1px solid rgba(200,168,75,0.1);gap:16px}
.waiter-item-left{}
.waiter-item-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--cream)}
.waiter-item-cat{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cream-muted);margin-top:3px}
.waiter-item-warn{font-size:10px;color:var(--gold-light);margin-top:4px;font-style:italic}
.waiter-item-price{font-size:20px;color:var(--gold);white-space:nowrap;font-family:'Cormorant Garamond',serif}
.waiter-total{display:flex;justify-content:space-between;padding:20px 0;border-top:1px solid rgba(200,168,75,0.3);margin-top:8px}
.waiter-total-label{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--cream-muted)}
.waiter-total-price{font-size:22px;color:var(--gold);font-family:'Cormorant Garamond',serif}
.waiter-close{background:transparent;border:1px solid rgba(200,168,75,0.3);color:var(--cream-muted);padding:14px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;margin-top:32px;width:100%;-webkit-appearance:none;touch-action:manipulation;transition:all 0.2s}
.waiter-close:hover{border-color:var(--gold);color:var(--gold)}
.restart-btn{background:transparent;border:none;color:var(--cream-muted);font-size:11px;cursor:pointer;font-family:'Montserrat',sans-serif;text-decoration:underline;display:block;width:100%;text-align:center;padding:12px;margin-top:8px;-webkit-appearance:none;touch-action:manipulation}

.gold-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0.2;margin:40px 0}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  nav{padding:14px 20px}
  .main{padding:80px 20px 100px}
  .question-card{padding:24px 18px}
  .bot-nav{flex-direction:column-reverse}
  .btn-next,.btn-back{width:100%;text-align:center}
  .float-order{bottom:20px;right:20px;left:20px;text-align:center}
  .waiter-overlay{padding:40px 24px}
  .dish-card{padding:16px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo-text" id="navHome">← Home</a>
  <ul class="nav-links">
    <li><a href="/menu">Menu</a></li>
    <li><a href="helper.html" class="active">Aiutami</a></li>
  </ul>
</nav>

<div class="main">
  <div class="page-header">
    <div class="page-eyebrow" id="pageEyebrow">Il tuo assistente personale</div>
    <h1 class="page-title" id="pageTitle">Cosa ti va<br>stasera?</h1>
    <p class="page-sub" id="pageSub">Rispondi a 4 domande — ti mostreremo i piatti adatti a te. Scegli quelli che vuoi e mostra la lista al cameriere.</p>
  </div>

  <!-- QUIZ -->
  <div id="quizWrap">
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">Domanda 1 di 4</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:25%"></div></div>
    </div>
    <div id="questionCard"></div>
    <div class="bot-nav" id="botNav">
      <button class="btn-back" id="btnBack" onclick="prevStep()" style="visibility:hidden">← Indietro</button>
      <button class="btn-next" id="btnNext" onclick="nextStep()" disabled>Avanti →</button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingWrap" style="display:none">
    <div class="loading"><div class="spinner"></div>Sto cercando i piatti perfetti per te...</div>
  </div>

  <!-- DISHES -->
  <div id="dishesWrap" style="display:none"></div>
</div>

<!-- FLOATING ORDER BUTTON -->
<button class="float-order" id="floatOrder" onclick="openWaiter()">
  🍽 Il mio ordine (<span id="orderCount">0</span>)
</button>

<!-- WAITER OVERLAY -->
<div class="waiter-overlay" id="waiterOverlay">
  <div class="waiter-title">Il mio ordine</div>
  <div class="waiter-sub">Mostra questo schermo al cameriere</div>
  <div class="waiter-items" id="waiterItems"></div>
  <button class="waiter-close" onclick="closeWaiter()">← Torna ai piatti</button>
  <button class="restart-btn" onclick="restart()">Ricomincia da capo</button>
</div>

<script>

    step_label: 'Question', of_label: 'of',
    next: 'Next →', back: '← Back',
  },
  ru: {

// QUIZ РЕНДЕР
// ═══════════════════════════════════════════════════

function renderQuestion() {
  const q = QUESTIONS[state.step];
  const total = QUESTIONS.length;
  const pct = Math.round(((state.step + 1) / total) * 100);

  document.getElementById('progressLabel').textContent = `${TQ.step_label} ${state.step + 1} ${TQ.of_label} ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('btnBack').style.visibility = state.step > 0 ? 'visible' : 'hidden';
  document.getElementById('btnNext').textContent = state.step < QUESTIONS.length - 1 ? TQ.next : (LANG === 'ru' ? 'Показать блюда →' : LANG === 'en' ? 'Show dishes →' : 'Mostra piatti →');
  document.getElementById('btnBack').textContent = TQ.back;

  const val = state.answers[q.id];
  const isMulti = q.type === 'multi';
  const selected = isMulti ? (Array.isArray(val) ? val : []) : val;

  const optsHTML = q.options.map(opt => {
    const isSel = isMulti ? selected.includes(opt) : selected === opt;
    const label = OL[opt] || opt;
    return `<button class="opt${isSel ? ' sel' : ''}"
      onclick="${isMulti ? `toggleOpt('${q.id}','${opt}')` : `pickOpt('${q.id}','${opt}')`}"
      >${label}</button>`;
  }).join('');

  document.getElementById('questionCard').innerHTML = `
    <div class="question-card">
      <div class="q-step">${TQ.step_label} ${q.step}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      <div class="options">${optsHTML}</div>
    </div>`;

  updateNextBtn();
}

function pickOpt(id, val) {
  state.answers[id] = val;
  renderQuestion();
}

function toggleOpt(id, val) {
  if (!Array.isArray(state.answers[id])) state.answers[id] = [];
  const arr = state.answers[id];

  if (val === 'Nessuna') {
    state.answers[id] = arr.includes('Nessuna') ? [] : ['Nessuna'];
  } else {
    // убираем "Nessuna" если выбираем что-то конкретное
    const ni = arr.indexOf('Nessuna');
    if (ni > -1) arr.splice(ni, 1);
    const idx = arr.indexOf(val);
    if (idx > -1) arr.splice(idx, 1);
    else arr.push(val);
  }
  renderQuestion();
}

function updateNextBtn() {
  const q = QUESTIONS[state.step];
  const val = state.answers[q.id];
  let ok = false;
  if (q.type === 'multi') ok = Array.isArray(val) && val.length > 0;
  else ok = !!val;
  document.getElementById('btnNext').disabled = !ok;
}

function nextStep() {
  if (state.step < QUESTIONS.length - 1) {
    state.step++;
    renderQuestion();
  } else {
    loadDishes();
  }
}

function prevStep() {
  if (state.step > 0) {
    state.step--;
    renderQuestion();
  }
}

async function loadDishes() {
  // Показываем лоадер
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('loadingWrap').style.display = 'block';

  // Маппим категории из Q4
  const catMap = { 'Antipasto': 'antipasti', 'Primo': 'primi', 'Secondo': 'secondi' };
  const categories = state.answers.categories
    .map(c => catMap[c])
    .filter(Boolean);

  // Маппим тип меню
  const menuMap = { 'Tradizione': 'tradizione', 'Gourmet': 'gourmet', 'Indifferente': '' };

  const payload = {
    allergens:  state.answers.allergens.filter(a => a !== 'Nessuna'),
    diet:       state.answers.diet === 'Nessuna restrizione' ? '' : state.answers.diet,
    menu_type:  menuMap[state.answers.menu_type] || '',
    categories: categories,
    lang:       LANG,
  };

  try {
    const res = await fetch(`${API_URL}/api/filter`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    showDishes(data);

  } catch (err) {
    // Если бэкенд недоступен — показываем заглушку
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('dishesWrap').style.display = 'block';
    const errMsg = {
      it: 'Il backend Python non è avviato.',
      en: 'The Python backend is not running.',
      ru: 'Python сервер не запущен.',
      de: 'Der Python-Server ist nicht gestartet.',
      fr: 'Le serveur Python n\'est pas démarré.',
      es: 'El servidor Python no está iniciado.',
      uk: 'Python сервер не запущено.',
      zh: 'Python服务器未启动。',
      ja: 'Pythonサーバーが起動していません。',
    };
    const errTitle = {
      it:'Server non disponibile', en:'Server unavailable', ru:'Сервер недоступен',
      de:'Server nicht verfügbar', fr:'Serveur indisponible', es:'Servidor no disponible',
      uk:'Сервер недоступний', zh:'服务器不可用', ja:'サーバー利用不可',
    };
    const restartLabel = {
      it:'Ricomincia', en:'Restart', ru:'Начать заново', de:'Neustart',
      fr:'Recommencer', es:'Reiniciar', uk:'Почати знову', zh:'重新开始', ja:'やり直す',
    };
    document.getElementById('dishesWrap').innerHTML = `
      <div class="no-results" style="padding:48px;text-align:center">
        <div style="font-size:32px;margin-bottom:16px">⚠</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);margin-bottom:8px">${errTitle[LANG]||errTitle.it}</div>

  };

        <div class="dishes-title">${DT.title}</div>
        <div class="dishes-sub">${DT.sub}</div>

    { key: 'primi',     dishes: data.primi || [] },
    { key: 'secondi',   dishes: data.secondi || [] },
  ];

  let hasAny = false;
  for (const sec of sections) {
    if (!sec.dishes.length) continue;
    hasAny = true;
    const label = CAT_LABELS[sec.key]?.[LANG] || sec.key;
    html += `<div class="category-block">
      <div class="cat-label">${label}</div>`;
    for (const dish of sec.dishes) {
      const isChosen = state.order.some(o => o.id === dish.id);
      const tags = [];
      if (dish.menu_type === 'gourmet') tags.push('Gourmet');
      html += `
        <div class="dish-card${isChosen ? ' chosen' : ''}" onclick="toggleDish(${dish.id})" data-id="${dish.id}">
          <div class="dish-check">${isChosen ? '✓' : ''}</div>

function toggleDish(id) {
  const dish = window._allDishes?.[id];
  if (!dish) return;

  const idx = state.order.findIndex(o => o.id === id);
  if (idx > -1) {
    state.order.splice(idx, 1);
  } else {
    state.order.push(dish);
  }

  // Обновляем карточку без перерисовки всего
  const card = document.querySelector(`.dish-card[data-id="${id}"]`);
  if (card) {
    const isNowChosen = state.order.some(o => o.id === id);
    card.classList.toggle('chosen', isNowChosen);
    card.querySelector('.dish-check').textContent = isNowChosen ? '✓' : '';
  }

  updateFloatBtn();
}

function updateFloatBtn() {
  const btn = document.getElementById('floatOrder');
  const count = state.order.length;
  document.getElementById('orderCount').textContent = count;
  btn.classList.toggle('show', count > 0);
}

// Определяем профиль блюд из выбранного заказа
function getDishProfile() {
  const order = state.order;
  if (!order.length) return { dish_type: 'any', menu_type: '', categories: [] };

  let hasMeat = false, hasFish = false, isVegan = true, isVegetarian = true;
  const menuTypes = new Set();
  const categories = new Set();

  for (const dish of order) {
    if (dish.is_meat || dish.is_meat === true) hasMeat = true;
    if (dish.is_fish || dish.is_fish === true) hasFish = true;
    if (!dish.is_vegan) isVegan = false;
    if (dish.is_meat || dish.is_fish) isVegetarian = false;
    if (dish.menu_type) menuTypes.add(dish.menu_type);
    if (dish.category) categories.add(dish.category);
  }

  let dish_type = 'any';
  if (hasMeat) dish_type = 'meat';
  else if (hasFish) dish_type = 'fish';
  else if (isVegan) dish_type = 'vegan';
  else if (isVegetarian) dish_type = 'vegetarian';

  const menu_type = menuTypes.size === 1 ? [...menuTypes][0] : '';
  return { dish_type, menu_type, categories: [...categories] };
}

    </div>`;
  renderPriceSliderInto('priceSliderWrap');
}

function renderPriceSliderInto(slotId) {
  const slot = document.getElementById(slotId);
  if (!slot) return;
  const min = 0, max = 250;
  wineState.priceMin = 0;
  wineState.priceMax = 250;

  slot.innerHTML = `
    <div class="price-slider-wrap">
      <span class="price-range-label" id="priceLabel">€0 — €250</span>
      <div class="price-track" id="priceTrack">
        <div class="price-track-fill" id="priceTrackFill"></div>
        <input type="range" class="price-slider" id="sliderMin" min="${min}" max="${max}" value="${min}" step="5">
        <input type="range" class="price-slider" id="sliderMax" min="${min}" max="${max}" value="${max}" step="5">
      </div>
      <div class="price-minmax"><span>€${min}</span><span>€${max}</span></div>
    </div>`;

  const slMin = document.getElementById('sliderMin');
  const slMax = document.getElementById('sliderMax');
  const label = document.getElementById('priceLabel');
  const fill  = document.getElementById('priceTrackFill');
  const track = document.getElementById('priceTrack');

  function updateSlider() {
    let lo = parseInt(slMin.value), hi = parseInt(slMax.value);
    if (lo > hi) { [lo, hi] = [hi, lo]; }
    wineState.priceMin = lo;
    wineState.priceMax = hi;
    label.textContent = `€${lo} — €${hi}`;
    const pct = (v) => ((v - min) / (max - min)) * 100;
    fill.style.left  = pct(lo) + '%';
    fill.style.width = (pct(hi) - pct(lo)) + '%';
  }
  slMin.addEventListener('input', updateSlider);
  slMax.addEventListener('input', updateSlider);
  updateSlider();
}

function wineToggleStyle(s) {

  const houseWines = [
    { name: 'Rosso Colli di Parma DOC BIO', grape: 'Barbera, Bonarda', color: 'rosso', desc_key: 'Vino rosso locale biologico, corposo e fruttato.' },
    { name: 'Lambrusco IGT Emilia', grape: 'Lambrusco Maestri', color: 'rosso', desc_key: 'Lambrusco frizzante secco, vivace e fresco.' },
    { name: 'Genestra Bianco Colli di Parma DOC BIO', grape: 'Malvasia di Candia', color: 'bianco', desc_key: 'Bianco biologico aromatico con note floreali.' },
    { name: 'Malvasia Frizzante IGT Emilia', grape: 'Malvasia di Candia', color: 'bianco', desc_key: 'Malvasia frizzante leggera e piacevole.' },
  ];
  const prices = { bicchiere: 5, q025: 7, q05: 9, bottiglia: 15 };

  let cardsHTML = houseWines.map(w => `
    <div class="wine-card" style="cursor:default">
      <div class="wine-card-info">
        <div class="wine-card-name">${w.name}</div>
        <div class="wine-card-meta">${w.grape} · Monte delle Vigne, Parma</div>
        <div class="wine-card-desc">${w.desc_key}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
          <button class="wine-opt" style="font-size:10px;padding:7px 12px" onclick="addHouseWine('${w.name}',${prices.bicchiere},'${WT.bicchiere}')">${WT.bicchiere} €${prices.bicchiere}</button>
          <button class="wine-opt" style="font-size:10px;padding:7px 12px" onclick="addHouseWine('${w.name}',${prices.q025},'${WT.q025}')">${WT.q025} €${prices.q025}</button>
          <button class="wine-opt" style="font-size:10px;padding:7px 12px" onclick="addHouseWine('${w.name}',${prices.q05},'${WT.q05}')">${WT.q05} €${prices.q05}</button>
          <button class="wine-opt" style="font-size:10px;padding:7px 12px" onclick="addHouseWine('${w.name}',${prices.bottiglia},'${WT.bottiglia}')">${WT.bottiglia} €${prices.bottiglia}</button>
        </div>
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="wine-title">${WT.house_title}</div>
    <div class="wine-sub">${WT.house_sub}</div>
    <div class="wine-cards">${cardsHTML}</div>
    <div style="margin-top:16px">
      <button class="btn-wine-no" onclick="showWines()">←</button>
      <button class="btn-wine-no" style="margin-left:10px" onclick="skipWine()">${WT.skip}</button>
    </div>`;
}

function addHouseWine(name, price, format) {
  const id = 'hw_' + name.replace(/\s/g,'_') + '_' + format;
  const idx = state.order.findIndex(o => o.id === id);
  if (idx === -1) {
    state.order.push({ _isWine: true, id, name, name_it: name, price, categoryKey: 'vino' });
    updateFloatBtn();
    // Flash feedback
    event?.target?.classList.add('sel');
    setTimeout(() => event?.target?.classList.remove('sel'), 600);
  }
}

async function fetchWines() {
  const offer = document.getElementById('wineOffer');
  offer.innerHTML = `<div class="wine-spinner-wrap"><div class="spinner"></div></div>`;

  const dishNames = state.order
    .filter(o => !o._isWine)
    .map(o => o.name_it || o.name);

  const payload = {
    dishes:     dishNames,
    format:     wineState.format === 'house' ? 'bottle' : wineState.format,
    local_only: wineState.localOnly || false,
    price_min:  wineState.priceMin || 0,
    price_max:  wineState.priceMax || 9999,
    lang:       LANG,
  };

  try {
    const res = await fetch(`${API_URL}/api/wines/ai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('API error');
    const wines = await res.json();
    renderWineResults(wines, offer);
  } catch (e) {
    offer.innerHTML = `
      <div class="wine-title" style="color:var(--gold)">!</div>
      <div class="wine-sub">Errore nel caricamento dei vini.<br>Controlla che il server sia avviato.</div>
      <button class="btn-wine-no" onclick="showWines()">← Riprova</button>`;
  }
}

function renderWineResults(wines, container) {
  const colorLabel = { rosso: 'Rosso', bianco: 'Bianco', rosato: 'Rosato', spumante: 'Spumante' };
  const styleBadge = { fermo: 'fermo', frizzante: 'frizzante', spumante: 'spumante' };

  if (!wines.length) {
    container.innerHTML = `
      <div class="wine-title">${WT.results_title}</div>
      <div class="wine-sub">${WT.no_wines}</div>
      <button class="btn-wine-no" onclick="showWines()">← ${WT.back_wines.replace('←','').trim()}</button>`;
    return;
  }

  let priceHTML = (w) => {
    if (wineState.format === 'glass') {
      if (wineState.glassSize === '0.25' && w.price_quarter) return `€${w.price_quarter.toFixed(2)} <small style="font-size:10px;color:var(--cream-muted)">/ 0.25lt</small>`;
      if (wineState.glassSize === '0.5'  && w.price_half)    return `€${w.price_half.toFixed(2)} <small style="font-size:10px;color:var(--cream-muted)">/ 0.5lt</small>`;
      if (w.price_glass) return `€${w.price_glass.toFixed(2)} <small style="font-size:10px;color:var(--cream-muted)">/ bicchiere</small>`;
    }
    if (w.price_bottle) return `€${w.price_bottle.toFixed(2)}`;
    return '';
  };

  let cardsHTML = wines.map(w => `
    <div class="wine-card" onclick="toggleWine(${w.id})" data-wine-id="${w.id}">
      <div class="wine-card-check"></div>
      <div class="wine-card-info">
        <div class="wine-card-name">${w.name}</div>
        <div class="wine-card-meta">${w.producer || ''} ${w.region ? '· ' + w.region : ''}</div>
        ${w.grape ? `<div class="wine-badge">${w.grape}</div>` : ''}
        <div class="wine-badge">${colorLabel[w.color] || w.color}</div>
        <div class="wine-badge">${styleBadge[w.style] || w.style}</div>
        ${w.ai_reason ? `<div class="wine-card-desc" style="margin-top:8px;font-style:italic;color:var(--gold-light);font-size:11px">✦ ${w.ai_reason}</div>` : ''}
        ${w.description ? `<div class="wine-card-desc" style="margin-top:4px">${w.description}</div>` : ''}
      </div>
      <div class="wine-card-price">${priceHTML(w)}</div>
    </div>`).join('');

  container.innerHTML = `
    <div class="wine-title">${WT.results_title}</div>
    <div class="wine-cards">${cardsHTML}</div>
    <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn-wine-no" onclick="showWines()">← ${WT.back_wines.replace('←','').trim()}</button>
      <button class="btn-wine-no" onclick="skipWine()">${WT.skip}</button>
    </div>`;

  // Сохраняем вина для заказа
  window._allWines = window._allWines || {};
  wines.forEach(w => { window._allWines[w.id] = w; });
}

function toggleWine(id) {
  const wine = window._allWines?.[id];
  if (!wine) return;
  const idx = state.order.findIndex(o => o._isWine && o.id === 'w' + id);
  const card = document.querySelector(`.wine-card[data-wine-id="${id}"]`);
  if (idx > -1) {
    state.order.splice(idx, 1);
    card?.classList.remove('chosen');
    card?.querySelector('.wine-card-check') && (card.querySelector('.wine-card-check').textContent = '');
  } else {
    // Добавляем в заказ как pseudo-dish
    state.order.push({
      _isWine: true,
      id: 'w' + id,
      name: wine.name,
      name_it: wine.name,
      price: wineState.format === 'glass'
        ? (wineState.glassSize === '0.25' ? wine.price_quarter : wineState.glassSize === '0.5' ? wine.price_half : wine.price_glass) || wine.price_glass || 0
        : wine.price_bottle || 0,
      categoryKey: 'vino',
    });
    card?.classList.add('chosen');
    card?.querySelector('.wine-card-check') && (card.querySelector('.wine-card-check').textContent = '✓');
  }
  updateFloatBtn();
}

function skipWine() {
  document.getElementById('wineOffer')?.remove();
}

function openWaiter() {
  if (!state.order.length) return;

  const CAT_IT = { antipasti:'Antipasti', primi:'Primo', secondi:'Secondo', vino:'Vino' };

  let itemsHTML = '';
  let total = 0;

  for (const dish of state.order) {
    total += dish.price;
    itemsHTML += `
      <div class="waiter-item">
        <div class="waiter-item-left">
          <div class="waiter-item-name">${dish.name_it}</div>
          <div class="waiter-item-cat">${CAT_IT[dish.categoryKey] || dish.categoryKey}</div>
          ${dish.adapt_note ? `<div class="waiter-item-warn">⚠ ${dish.adapt_note}</div>` : ''}
        </div>
        <div class="waiter-item-price">€ ${dish.price.toFixed(2)}</div>
      </div>`;
  }

  itemsHTML += `
    <div class="waiter-total">
      <span class="waiter-total-label">Totale stimato</span>
      <span class="waiter-total-price">€ ${total.toFixed(2)}</span>
    </div>`;

  document.getElementById('waiterItems').innerHTML = itemsHTML;
  document.getElementById('waiterOverlay').classList.add('show');
}

function closeWaiter() {
  document.getElementById('waiterOverlay').classList.remove('show');
}

function restart() {
  state = { step: 0, answers: { allergens: [], diet: '', menu_type: '', categories: [] }, order: [] };
  window._allDishes = {};
  document.getElementById('waiterOverlay').classList.remove('show');
  document.getElementById('dishesWrap').style.display = 'none';
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  document.getElementById('floatOrder').classList.remove('show');
  renderQuestion();
}
