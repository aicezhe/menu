<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu – Ristorante Gallo d'Oro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C8A84B;--gold-light:#E2C97E;--dark:#0E0D0B;--dark-2:#1A1814;--dark-3:#252319;--cream:#F5EDD8;--cream-muted:#B8A98A}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(14,13,11,0.97);border-bottom:1px solid rgba(200,168,75,0.15)}
.nav-logo img{height:40px}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:var(--cream-muted);text-decoration:none;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;transition:color 0.3s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.menu-hero{padding:130px 60px 60px;border-bottom:1px solid rgba(200,168,75,0.1)}
.menu-hero-eyebrow{font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:14px}
.menu-hero-eyebrow::before{content:'';width:30px;height:1px;background:var(--gold);display:block}
.menu-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,5vw,72px);font-weight:300;color:var(--cream);line-height:1}
.menu-hero h1 em{font-style:italic;color:var(--gold)}
.menu-concept{display:flex;gap:16px;margin-top:32px;flex-wrap:wrap}
.concept-badge{padding:10px 24px;border:1px solid rgba(200,168,75,0.3);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cream-muted)}
.concept-badge.gold{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:500}
.tabs-bar{position:sticky;top:61px;z-index:90;background:rgba(14,13,11,0.97);border-bottom:1px solid rgba(200,168,75,0.12);display:flex;overflow-x:auto;padding:0 60px;scroll-behavior:smooth}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--cream-muted);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;padding:16px 24px;cursor:pointer;white-space:nowrap;transition:all 0.3s;-webkit-appearance:none}
.tab-btn:hover{color:var(--cream)}
.tab-btn.active{color:var(--dark);background:var(--gold);border-bottom-color:var(--gold);font-weight:600;letter-spacing:0.18em;padding:16px 28px;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.coperto-bar{background:var(--dark-3);border-top:1px solid rgba(200,168,75,0.1);border-bottom:1px solid rgba(200,168,75,0.1);padding:16px 60px;text-align:center;font-size:11px;color:var(--cream-muted);letter-spacing:0.1em}
.coperto-bar strong{color:var(--gold)}
.menu-section{padding:70px 60px;border-bottom:1px solid rgba(200,168,75,0.08)}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:300;color:var(--cream);line-height:1;margin-bottom:40px}
.section-title em{font-style:italic;color:var(--gold)}
.menu-type-block{margin-bottom:48px}
.menu-type-label{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.menu-type-label::after{content:'';flex:1;height:1px;background:rgba(200,168,75,0.12)}
.type-tag{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;padding:6px 16px;border:1px solid}
.type-tag.tradizionale{color:var(--cream-muted);border-color:rgba(184,169,138,0.3)}
.type-tag.gourmet{color:var(--gold);border-color:rgba(200,168,75,0.5);background:rgba(200,168,75,0.05)}
.type-tag.salumi{color:#F0997B;border-color:rgba(240,153,123,0.4)}
.type-tag.degustazione{color:#9FE1CB;border-color:rgba(159,225,203,0.4)}
.dish-row{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 0;border-bottom:1px solid rgba(200,168,75,0.06);gap:24px}
.dish-row:last-child{border-bottom:none}
.dish-info{flex:1}
.dish-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--cream);font-style:italic;margin-bottom:4px}
.dish-desc{font-size:11px;line-height:1.7;color:var(--cream-muted);margin-bottom:6px}
.dish-adapt{font-size:10px;color:var(--gold-light);background:rgba(226,201,126,0.07);padding:5px 10px;border-left:2px solid var(--gold-light);margin-top:6px}
.dish-allergens{font-size:10px;color:rgba(184,169,138,0.5);letter-spacing:0.05em;margin-top:4px}
.dish-allergens span{color:rgba(200,168,75,0.6)}
.dish-price{font-size:14px;font-weight:400;color:var(--gold);white-space:nowrap;padding-top:2px}
.dish-gourmet-tag{display:inline-block;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;padding:2px 8px;background:rgba(200,168,75,0.1);color:var(--gold);border:1px solid rgba(200,168,75,0.2);margin-bottom:6px}
.simple-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.simple-item{background:var(--dark-2);padding:20px 24px;border:1px solid rgba(200,168,75,0.06);transition:border-color 0.3s}
.simple-item:hover{border-color:rgba(200,168,75,0.2)}
.simple-item-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--cream);margin-bottom:4px}
.simple-item-desc{font-size:11px;color:var(--cream-muted);line-height:1.6;margin-bottom:6px}
.simple-item-price{font-size:13px;color:var(--gold)}
.gold-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0.2}
.menu-footer{background:#080807;padding:30px 60px;border-top:1px solid rgba(200,168,75,0.1);display:flex;justify-content:space-between;align-items:center}
.menu-footer a{color:var(--gold);text-decoration:none;font-family:'Cormorant Garamond',serif;font-size:18px}
.menu-footer span{font-size:10px;letter-spacing:0.3em;color:var(--cream-muted);text-transform:uppercase}
.loading{text-align:center;padding:80px;color:var(--cream-muted);font-size:13px;font-style:italic}
.spinner{width:32px;height:32px;border:2px solid rgba(200,168,75,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.menu-section{animation:fadeUp 0.6s both}
@media(max-width:768px){
  nav{padding:14px 20px}
  .tabs-bar{padding:0 20px}
  .menu-hero{padding:100px 20px 40px}
  .menu-section{padding:48px 20px}
  .simple-grid{grid-template-columns:1fr 1fr}
  .menu-footer{padding:20px;flex-direction:column;gap:12px;text-align:center}
  .coperto-bar{padding:12px 20px}
}
@media(max-width:480px){.simple-grid{grid-template-columns:1fr}}
</style>
</head>

  document.getElementById('navHelper').textContent = T.helper;

  document.getElementById('tabDolci').textContent = T.tabs.dolci;

// ── RENDER ──
function renderDishRow(dish) {
  const isGourmet = dish.menu_type === 'gourmet';
  const allergens = dish.allergens && dish.allergens.length
    ? `<div class="dish-allergens"><span>${T.allergen}</span> ${dish.allergens.join(', ')}</div>` : '';
  const adaptNote = dish.adapt_note
    ? `<div class="dish-adapt">⚠ ${dish.adapt_note}</div>` : '';
  return `
    <div class="dish-row">
      <div class="dish-info">
        ${isGourmet ? `<div class="dish-gourmet-tag">${T.seasonal}</div>` : ''}
        <div class="dish-name">${dish.name_it}</div>
        ${dish.description ? `<div class="dish-desc">${dish.description}</div>` : ''}
        ${adaptNote}
        ${allergens}
      </div>
      <div class="dish-price">€ ${Number(dish.price).toFixed(2)}</div>
    </div>`;
}

function renderTypeBlock(dishes, type, label) {
  if (!dishes.length) return '';
  return `
    <div class="menu-type-block">
      <div class="menu-type-label"><span class="type-tag ${type}">${label}</span></div>
      ${dishes.map(renderDishRow).join('')}
    </div>`;
}

function renderSimpleGrid(items) {
  return `<div class="simple-grid">${items.map(item => `
    <div class="simple-item">
      <div class="simple-item-name">${item.name_it}</div>
      ${item.desc ? `<div class="simple-item-desc">${item.desc[LANG] || item.desc.it || ''}</div>` : ''}
      ${item.allergens && item.allergens.length ? `<div class="dish-allergens" style="font-size:10px;margin-top:4px"><span style="color:rgba(200,168,75,0.6)">${T.allergen}</span> ${item.allergens.join(', ')}</div>` : ''}
      <div class="simple-item-price">€ ${Number(item.price).toFixed(2)}</div>
    </div>`).join('')}</div>`;
}

function renderMenu(allDishes) {
  const byCategory = {};
  allDishes.forEach(d => {
    if (!byCategory[d.category]) byCategory[d.category] = [];
    byCategory[d.category].push(d);
  });

  const get = (cat, type) => (byCategory[cat] || []).filter(d => d.menu_type === type);

  // Antipasti — разбиваем на подгруппы
  const antipastiTrad = get('antipasti','tradizione').filter(d =>
    !['Tagliere Goloso','Tagliere dei Preziosi','Tagliere Salumi del Contadino','Degustazione di Formaggi Misti'].includes(d.name_it) &&
    !d.name_it.startsWith('Prosciutto') && !d.name_it.startsWith('Culatello') &&
    !d.name_it.startsWith('Culatta') && !d.name_it.startsWith('Spallaccio') &&
    !d.name_it.startsWith('Spalla') && !d.name_it.startsWith('Salame') &&
    !d.name_it.startsWith('Coppa') && !d.name_it.startsWith('Strolghino') &&
    !d.name_it.startsWith('Cicciolata')
  );
  const degust = get('antipasti','tradizione').filter(d =>
    ['Tagliere Goloso','Tagliere dei Preziosi','Tagliere Salumi del Contadino','Degustazione di Formaggi Misti'].includes(d.name_it)
  );
  const salumi = get('antipasti','tradizione').filter(d =>
    d.name_it.startsWith('Prosciutto') || d.name_it.startsWith('Culatello') ||
    d.name_it.startsWith('Culatta') || d.name_it.startsWith('Spallaccio') ||
    d.name_it.startsWith('Spalla') || d.name_it.startsWith('Salame') ||
    d.name_it.startsWith('Coppa') || d.name_it.startsWith('Strolghino') ||
    d.name_it.startsWith('Cicciolata')
  );
  const antipastiGourmet = get('antipasti','gourmet');
  const primiTrad = get('primi','tradizione');
  const primiGourmet = get('primi','gourmet');
  const secondiTrad = get('secondi','tradizione');
  const secondiGourmet = get('secondi','gourmet');

  let html = '';

  // ANTIPASTI
  html += `<section class="menu-section" id="antipasti">
    <h2 class="section-title"><em>${T.sections.antipasti}</em></h2>
    ${renderTypeBlock(antipastiTrad, 'tradizionale', T.tradTag)}
    ${renderTypeBlock(degust, 'degustazione', T.degustazioneTag)}
    ${renderTypeBlock(salumi, 'salumi', T.salumiTag)}
    ${renderTypeBlock(antipastiGourmet, 'gourmet', T.gourmetTag)}
  </section><div class="gold-divider"></div>`;

  // PRIMI
  html += `<section class="menu-section" id="primi">
    <h2 class="section-title"><em>${T.sections.primi}</em></h2>
    ${renderTypeBlock(primiTrad, 'tradizionale', T.tradTag)}
    ${renderTypeBlock(primiGourmet, 'gourmet', T.gourmetTag)}
  </section><div class="gold-divider"></div>`;

  // SECONDI
  html += `<section class="menu-section" id="secondi">
    <h2 class="section-title"><em>${T.sections.secondi}</em></h2>
    ${renderTypeBlock(secondiTrad, 'tradizionale', T.tradTag)}
    ${renderTypeBlock(secondiGourmet, 'gourmet', T.gourmetTag)}
  </section><div class="gold-divider"></div>`;

  // CONTORNI
  html += `<section class="menu-section" id="contorni">
    <h2 class="section-title"><em>${T.sections.contorni}</em></h2>
    ${renderSimpleGrid(STATIC.contorni)}
  </section><div class="gold-divider"></div>`;

  // DOLCI & CAFFE
  html += `<section class="menu-section" id="dolci">
    <h2 class="section-title"><em>${T.sections.dolci}</em></h2>
    <div class="menu-type-block">
      <div class="menu-type-label"><span class="type-tag tradizionale">${LANG==='ru'?'Десерты':LANG==='en'?'Desserts':LANG==='de'?'Desserts':LANG==='fr'?'Desserts':LANG==='es'?'Postres':LANG==='uk'?'Десерти':LANG==='zh'?'甜点':LANG==='ja'?'デザート':'Dolci'}</span></div>
      ${STATIC.dolci.map(d => `
        <div class="dish-row">
          <div class="dish-info">
            <div class="dish-name">${d.name_it}</div>
            ${d.desc ? `<div class="dish-desc">${d.desc[LANG] || d.desc.it}</div>` : ''}
            ${d.allergens ? `<div class="dish-allergens"><span>${T.allergen}</span> ${d.allergens.join(', ')}</div>` : ''}
          </div>
          <div class="dish-price">€ ${d.price.toFixed(2)}</div>
        </div>`).join('')}
    </div>
    <div class="menu-type-block">
      <div class="menu-type-label"><span class="type-tag tradizionale">${LANG==='ru'?'Кофе':LANG==='en'?'Coffee':LANG==='de'?'Kaffee':LANG==='fr'?'Café':LANG==='es'?'Café':LANG==='uk'?'Кава':LANG==='zh'?'咖啡':LANG==='ja'?'コーヒー':'Caffè'}</span></div>
      ${renderSimpleGrid(STATIC.caffe)}
    </div>
  </section><div class="gold-divider"></div>`;

  // BEVANDE
  html += `<section class="menu-section" id="bevande">
    <h2 class="section-title"><em>${T.sections.bevande}</em></h2>
    ${renderSimpleGrid(STATIC.bevande)}
  </section>`;

  document.getElementById('menuContent').innerHTML = html;
  initScrollSpy();
}

// ── SCROLL SPY ──
function scrollToSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const offset = 61 + 49;
  window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - offset, behavior:'smooth'});
}

function initScrollSpy() {
  const sections = ['antipasti','primi','secondi','contorni','dolci','bevande'];
  const tabs = document.querySelectorAll('.tab-btn');
  window.addEventListener('scroll', () => {
    let current = sections[0];
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.getBoundingClientRect().top <= 120) current = id;
    });
    tabs.forEach((btn, i) => {
      const isActive = sections[i] === current;
      btn.classList.toggle('active', isActive);
      if (isActive) {
        btn.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'center'});
      }
    });
  });
}

// ── INIT ──

fetch(`/api/dishes?lang=${LANG}`)
  .then(r => r.json())
  .then(data => renderMenu(data))
  .catch(() => {
    document.getElementById('menuContent').innerHTML = `
      <div class="loading">⚠ Server non disponibile<br><small>uvicorn main:app --reload</small></div>`;
  });
</script>
